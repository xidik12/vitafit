<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="atitle adesc">
  <title id="atitle">How VitaFit fits together</title>
  <desc id="adesc">A left-to-right map: a Telegram user reaches VitaFit through the bot and the React Mini App, both served by one FastAPI backend. The backend reads and writes a PostgreSQL or SQLite database and a Redis cache, is fed by nutrition and exercise content collectors (USDA, Open Food Facts, TheMealDB, Free Exercise DB, Spoonacular), and runs a background scheduler for reminders, weekly summaries, nightly data sync, and cleanup.</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#9fb6a4"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="378" rx="26" fill="#fefdf8" stroke="#dcece0" stroke-width="2"/>

  <text x="48" y="52" class="mono" font-size="13" letter-spacing="2" fill="#15803d">HOW IT FITS TOGETHER</text>

  <!-- connectors (drawn first, under nodes) -->
  <g fill="none" stroke="#9fb6a4" stroke-width="2" marker-end="url(#arw)">
    <path d="M232 150 L286 150"/>            <!-- user -> surfaces -->
    <path d="M486 150 L556 150"/>            <!-- surfaces -> api -->
    <path d="M820 130 L764 130"/>            <!-- collectors -> api -->
  </g>
  <!-- api -> stores -->
  <g fill="none" stroke="#9fb6a4" stroke-width="2" marker-end="url(#arw)">
    <path d="M660 214 L660 250"/>
  </g>

  <!-- 1. user -->
  <g transform="translate(48 96)">
    <rect x="0" y="0" width="184" height="108" rx="18" fill="#f0fdf4" stroke="#bbe8c8"/>
    <path d="M28 34 h60 a10 10 0 0 1 10 10 v20 a10 10 0 0 1 -10 10 h-34 l-16 14 v-14 h-10 a10 10 0 0 1 -10 -10 v-20 a10 10 0 0 1 10 -10 Z" fill="#22c55e"/>
    <text x="24" y="90" class="sans" font-size="15" font-weight="700" fill="#1a2e1a">You, in Telegram</text>
    <text x="106" y="30" class="sans" font-size="11" fill="#15803d"> </text>
  </g>

  <!-- 2. surfaces -->
  <g transform="translate(286 78)">
    <rect x="0" y="0" width="200" height="66" rx="16" fill="#ffffff" stroke="#d7e6dc"/>
    <text x="20" y="30" class="sans" font-size="15" font-weight="700" fill="#1a2e1a">Bot</text>
    <text x="20" y="50" class="mono" font-size="12" fill="#6b7b6b">aiogram · @vitafit_bot</text>

    <rect x="0" y="78" width="200" height="66" rx="16" fill="#ffffff" stroke="#d7e6dc"/>
    <text x="20" y="108" class="sans" font-size="15" font-weight="700" fill="#1a2e1a">Mini App</text>
    <text x="20" y="128" class="mono" font-size="12" fill="#6b7b6b">React · Vite · Tailwind</text>
  </g>

  <!-- 3. FastAPI core -->
  <g transform="translate(556 96)">
    <rect x="0" y="0" width="208" height="118" rx="18" fill="#dcfce7" stroke="#8fd6a3"/>
    <text x="24" y="34" class="sans" font-size="18" font-weight="800" fill="#15803d">FastAPI</text>
    <text x="24" y="58" class="mono" font-size="12" fill="#2f5a3a">auth · questionnaire</text>
    <text x="24" y="78" class="mono" font-size="12" fill="#2f5a3a">plans · calories</text>
    <text x="24" y="98" class="mono" font-size="12" fill="#2f5a3a">progress · vitals</text>
  </g>

  <!-- 4. collectors -->
  <g transform="translate(820 78)">
    <rect x="0" y="0" width="332" height="104" rx="18" fill="#fff7ed" stroke="#fcd9a6"/>
    <text x="22" y="30" class="sans" font-size="14" font-weight="700" fill="#b45309">Content collectors</text>
    <g class="mono" font-size="12" fill="#7c4a12">
      <text x="22" y="54">USDA · Open Food Facts</text>
      <text x="22" y="74">TheMealDB · Spoonacular</text>
      <text x="22" y="94">Free Exercise DB</text>
    </g>
  </g>

  <!-- 5. stores -->
  <g transform="translate(556 250)">
    <rect x="0" y="0" width="100" height="60" rx="14" fill="#ffffff" stroke="#d7e6dc"/>
    <text x="50" y="30" text-anchor="middle" class="sans" font-size="14" font-weight="700" fill="#1a2e1a">Postgres</text>
    <text x="50" y="47" text-anchor="middle" class="mono" font-size="10" fill="#6b7b6b">/ SQLite</text>

    <rect x="116" y="0" width="92" height="60" rx="14" fill="#ffffff" stroke="#d7e6dc"/>
    <text x="162" y="30" text-anchor="middle" class="sans" font-size="14" font-weight="700" fill="#1a2e1a">Redis</text>
    <text x="162" y="47" text-anchor="middle" class="mono" font-size="10" fill="#6b7b6b">cache</text>
  </g>

  <!-- 6. scheduler band -->
  <g transform="translate(820 250)">
    <rect x="0" y="0" width="332" height="60" rx="14" fill="#f0fdf4" stroke="#cdeed6"/>
    <text x="20" y="26" class="sans" font-size="13" font-weight="700" fill="#15803d">Background scheduler</text>
    <text x="20" y="46" class="mono" font-size="11" fill="#3f6b49">reminders · weekly summary · sync · cleanup</text>
  </g>

  <!-- footer note -->
  <text x="48" y="345" class="mono" font-size="12" fill="#6b7b6b">Frontend build + Python backend ship as one Docker image.</text>
</svg>
