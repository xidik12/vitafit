<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-labelledby="title desc">
  <title id="title">VitaFit — a free personal health and fitness coach inside Telegram</title>
  <desc id="desc">Left: the name VitaFit with the line "A free personal coach that lives in your chat — gentle workouts, meal plans, and calorie tracking," plus tags reading Free, no account, EN / RU, and Halal-aware. Right: an illustration of the VitaFit Mini App dashboard showing a daily calorie ring, a seven-day streak, a protein/carbs/fat macro bar, today's gentle-yoga session, and a bottom navigation bar.</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <!-- canvas -->
  <rect x="1" y="1" width="1198" height="418" rx="26" fill="#fefdf8" stroke="#dcece0" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="418" rx="26" fill="url(#g)" opacity="0"/>

  <!-- ============ LEFT: title block ============ -->
  <g transform="translate(64 0)">
    <!-- leaf mark -->
    <g transform="translate(0 74)">
      <circle cx="17" cy="17" r="17" fill="#dcfce7"/>
      <path d="M9 22 C9 13 17 9 26 9 C26 18 18 22 9 22 Z" fill="#22c55e"/>
      <path d="M11 20 C15 16 20 13 24 12" stroke="#15803d" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    </g>

    <!-- eyebrow -->
    <text x="46" y="86" class="mono" font-size="13" letter-spacing="2.5" fill="#15803d">TELEGRAM MINI APP · HEALTH &amp; FITNESS COACH</text>

    <!-- name -->
    <text x="-2" y="176" class="sans" font-size="96" font-weight="800" fill="#1a2e1a" letter-spacing="-2">VitaFit</text>

    <!-- promise -->
    <text x="0" y="224" class="sans" font-size="23" font-weight="600" fill="#324a32">A free personal coach that lives in your chat —</text>
    <text x="0" y="256" class="sans" font-size="23" font-weight="600" fill="#324a32">gentle workouts, meal plans, and calorie tracking.</text>

    <!-- tags -->
    <g transform="translate(0 300)" class="sans" font-size="14" font-weight="600">
      <g>
        <rect x="0" y="0" width="150" height="34" rx="17" fill="#f0fdf4" stroke="#bbe8c8"/>
        <circle cx="20" cy="17" r="4" fill="#22c55e"/>
        <text x="34" y="22" fill="#15803d">Free · no account</text>
      </g>
      <g transform="translate(162 0)">
        <rect x="0" y="0" width="92" height="34" rx="17" fill="#f0fdf4" stroke="#bbe8c8"/>
        <text x="18" y="22" fill="#15803d">EN / RU</text>
      </g>
      <g transform="translate(266 0)">
        <rect x="0" y="0" width="128" height="34" rx="17" fill="#fff7ed" stroke="#fcd9a6"/>
        <text x="18" y="22" fill="#b45309">Halal-aware</text>
      </g>
    </g>

    <!-- footprint metadata -->
    <text x="0" y="376" class="mono" font-size="13" fill="#6b7b6b">FastAPI · React · aiogram   ·   one Docker image   ·   deploys on Railway</text>
  </g>

  <!-- ============ RIGHT: Mini App illustration ============ -->
  <g transform="translate(812 34)">
    <!-- phone body -->
    <rect x="0" y="0" width="324" height="352" rx="34" fill="#ffffff" stroke="#d7e6dc" stroke-width="2"/>
    <rect x="12" y="12" width="300" height="328" rx="24" fill="#fefdf8"/>

    <!-- header -->
    <text x="32" y="52" class="sans" font-size="13" fill="#6b7b6b">Good morning,</text>
    <text x="32" y="74" class="sans" font-size="20" font-weight="700" fill="#1a2e1a">Anna</text>
    <!-- streak tag -->
    <g transform="translate(214 40)">
      <rect x="0" y="0" width="76" height="30" rx="15" fill="#fff7ed" stroke="#fcd9a6"/>
      <path d="M16 9 C21 12 20 17 17 21 C22 20 24 14 20 8 C21 12 19 13 18 13 C19 10 17 8 16 9 Z" fill="#f59e0b"/>
      <text x="30" y="20" class="sans" font-size="13" font-weight="700" fill="#b45309">7 days</text>
    </g>

    <!-- calorie ring -->
    <g transform="translate(94 168)">
      <circle cx="0" cy="0" r="52" fill="none" stroke="#dcfce7" stroke-width="13"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#22c55e" stroke-width="13"
              stroke-linecap="round" stroke-dasharray="222 327" transform="rotate(-90)"/>
      <text x="0" y="-2" text-anchor="middle" class="sans" font-size="26" font-weight="800" fill="#1a2e1a">1,240</text>
      <text x="0" y="18" text-anchor="middle" class="sans" font-size="12" fill="#6b7b6b">kcal left</text>
    </g>

    <!-- macro bar -->
    <g transform="translate(176 132)">
      <text x="0" y="0" class="sans" font-size="12" fill="#6b7b6b">Macros today</text>
      <rect x="0" y="12" width="112" height="12" rx="6" fill="#eef2ee"/>
      <rect x="0" y="12" width="46" height="12" rx="6" fill="#22c55e"/>
      <rect x="48" y="12" width="40" height="12" rx="6" fill="#f59e0b"/>
      <rect x="90" y="12" width="22" height="12" rx="6" fill="#3b82f6"/>
      <g class="sans" font-size="11" fill="#6b7b6b">
        <circle cx="4" cy="42" r="4" fill="#22c55e"/><text x="14" y="46">Protein</text>
        <circle cx="4" cy="62" r="4" fill="#f59e0b"/><text x="14" y="66">Carbs</text>
        <circle cx="4" cy="82" r="4" fill="#3b82f6"/><text x="14" y="86">Fat</text>
      </g>
    </g>

    <!-- today's session card -->
    <g transform="translate(32 234)">
      <rect x="0" y="0" width="258" height="52" rx="16" fill="#f0fdf4" stroke="#cdeed6"/>
      <circle cx="28" cy="26" r="16" fill="#dcfce7"/>
      <path d="M22 26 C22 21 26 19 31 19 C31 24 26 26 22 26 Z" fill="#22c55e"/>
      <text x="54" y="22" class="sans" font-size="13" font-weight="700" fill="#1a2e1a">Today · gentle yoga</text>
      <text x="54" y="39" class="sans" font-size="12" fill="#6b7b6b">20 min · low impact</text>
      <text x="236" y="31" text-anchor="end" class="sans" font-size="18" fill="#22c55e">›</text>
    </g>

    <!-- bottom nav -->
    <g transform="translate(12 300)">
      <rect x="0" y="0" width="300" height="40" rx="0" fill="#ffffff"/>
      <line x1="0" y1="0" x2="300" y2="0" stroke="#eef2ee"/>
      <g class="sans" font-size="10" text-anchor="middle">
        <g transform="translate(30 0)">
          <rect x="-22" y="8" width="44" height="24" rx="12" fill="#dcfce7"/>
          <text x="0" y="24" fill="#15803d" font-weight="700">Home</text>
        </g>
        <text x="90" y="24" fill="#9aa79a">Exercises</text>
        <text x="150" y="24" fill="#9aa79a">Meals</text>
        <text x="210" y="24" fill="#9aa79a">Log</text>
        <text x="270" y="24" fill="#9aa79a">Progress</text>
      </g>
    </g>
  </g>
</svg>
